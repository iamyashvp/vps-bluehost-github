name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 50.6.249.30
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/vps-bluehost-github
            git pull origin main
